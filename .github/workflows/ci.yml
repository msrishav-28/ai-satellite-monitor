# Continuous integration workflow for the backend and canonical /space frontend.
# Added in Phase 4 to enforce lint, typecheck, build, and backend test coverage on every change.

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            space/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix space ci --legacy-peer-deps

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r backend/requirements.txt

      - name: Lint frontend
        run: npm run lint

      - name: Type-check frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Run backend tests
        run: python -m pytest backend/tests
